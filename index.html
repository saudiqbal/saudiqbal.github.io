<!DOCTYPE html>
<html>
<head>
<title>Saud Iqbal</title>
<meta name="viewport" content="user-scalable=yes, initial-scale=1, width=device-width">
<style>
body {
padding: 0px;
display: flex;
justify-content: center;
align-items: center;
height: 95vh;
background: #000;
}

#container {
margin: 0 auto;
text-align: center;
}

.text-glow {
font-size: calc(20px + 8vi);
line-height: calc(20px + 10vi);
text-shadow: 0 0 5px #ffa500, 0 0 15px #ffa500, 0 0 20px #ffa500, 0 0 40px #ffa500, 0 0 60px #ff0000, 0 0 10px #ff8d00, 0 0 98px #ff0000;
color: #fff6a9;
font-family: Arial, sans-serif;
text-align: center;
animation: blink 12s infinite;
-webkit-animation: blink 12s infinite;
}

@-webkit-keyframes blink {
20%,24%,55% {
color: #111;
text-shadow: none;
}

0%,19%,21%,23%,25%,54%,56%,100% {
text-shadow: 0 0 5px #ffa500, 0 0 15px #ffa500, 0 0 20px #ffa500, 0 0 40px #ffa500, 0 0 60px #ff0000, 0 0 10px #ff8d00, 0 0 98px #ff0000;
color: #fff6a9;
}
}

@keyframes blink {
20%,24%,55% {
color: #111;
text-shadow: none;
}

0%,19%,21%,23%,25%,54%,56%,100% {
text-shadow: 0 0 5px #ffa500, 0 0 15px #ffa500, 0 0 20px #ffa500, 0 0 40px #ffa500, 0 0 60px #ff0000, 0 0 10px #ff8d00, 0 0 98px #ff0000;
color: #fff6a9;
}
}

</style>
</head>
<body>

<div id="container">
<h1 class="text-glow">Saud Iqbal</h1>
</div>

</body>
</html>
